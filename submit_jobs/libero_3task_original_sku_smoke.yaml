description: "pi05 LIBERO 3-task original-speed finetuning smoke tests on large H100/A100 SKUs"

target:
  service: sing
  name: msrresrchbasicvc
  workspace_name: shared_ws

environment:
  image: amlt-sing/2.5.0-cuda12.4-cudnn9-devel

code:
  local_dir: $CONFIG_DIR/..

storage:
  output:
    storage_account_name: singaporeteamstorage
    container_name: shared
    mount_dir: /mnt/default_storage

env_defaults:
  USER: root
  AMLT_VULN_SCAN_MODE: "none"

jobs:
  - name: smoke-libero-3task-original-80g8-h100-nvlink
    sku: 80G8-H100-NvLink
    sla_tier: standard
    identity: managed
    command:
      - set -e
      - cd /scratch/amlt_code
      - nvidia-smi
      - sudo apt-get update && sudo apt-get install -y git git-lfs build-essential clang curl ca-certificates pkg-config software-properties-common
      - sudo add-apt-repository -y ppa:ubuntuhandbook1/ffmpeg7
      - sudo apt-get update && sudo apt-get install -y ffmpeg libavformat-dev libavcodec-dev libavdevice-dev libavutil-dev libswscale-dev libswresample-dev libavfilter-dev
      - git lfs install
      - curl -LsSf https://astral.sh/uv/install.sh | sh
      - export PATH="$$HOME/.local/bin:$$HOME/.cargo/bin:$$PATH"
      - GIT_LFS_SKIP_SMUDGE=1 uv sync
      - GIT_LFS_SKIP_SMUDGE=1 uv pip install -e .
      - uv pip install "datasets<4"
      - TRANSFORMERS_DIR=$$(uv run python -c "import transformers, os; print(os.path.dirname(transformers.__file__))")
      - cp -r src/openpi/models_pytorch/transformers_replace/* "$$TRANSFORMERS_DIR/"
      - ls -la /mnt/default_storage/qiming/datasets/libero_3task/meta/
      - LIBERO_DATASET_ROOT=/mnt/default_storage/qiming/datasets/libero_3task XLA_PYTHON_CLIENT_MEM_FRACTION=0.9 uv run scripts/train.py pi05_libero_5task --exp-name=e1_libero_3task_original_smoke_80g8_h100_nvlink_0429f --checkpoint-base-dir=/mnt/default_storage/qiming/openpi/checkpoints --batch-size=16 --overwrite --num-train-steps 20 --save-interval 20 --log-interval 5
    submit_args:
      max_run_duration_seconds: 7200
      env:
        AMLT_BLOB_ROOT_DIR: /mnt/default_storage
        XLA_PYTHON_CLIENT_MEM_FRACTION: "0.9"
        WANDB_BASE_URL: "https://api.wandb.ai"
        WANDB_API_KEY: "$WANDB_API_KEY"
        WANDB_MODE: "online"
        WANDB_RUN_GROUP: "speed-var-3task-sku-smoke-0429f"
        _AZUREML_SINGULARITY_JOB_UAI: "/subscriptions/e033d461-1923-44a7-872b-78f1d35a86dd/resourcegroups/SingaporeTeam/providers/Microsoft.ManagedIdentity/userAssignedIdentities/shared_mi"

  - name: smoke-libero-3task-original-80g8-a100-nvlink
