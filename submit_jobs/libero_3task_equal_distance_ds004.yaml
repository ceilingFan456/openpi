      - uv run python scripts/data_prep_equal_distance_actions.py --input-root /mnt/default_storage/qiming/datasets/libero_3task_speed_extreme_quarter/mixed --output-root /mnt/default_storage/qiming/datasets/libero_3task_speed_quarter_equal_distance_ds004 --ds 0.004 --overwrite
      - ls -la /mnt/default_storage/qiming/datasets/libero_3task_speed_quarter_equal_distance_ds004/meta/
