      - uv run python scripts/data_prep_equal_distance_actions.py --input-root /mnt/default_storage/qiming/datasets/libero_3task --output-root /mnt/default_storage/qiming/datasets/libero_3task_speed_varied_equal_distance_ds004 --ds 0.004 --episode-speed-choices 0.5 1.0 2.0 --speed-seed 42 --overwrite
      - ls -la /mnt/default_storage/qiming/datasets/libero_3task_speed_varied_equal_distance_ds004/meta/
      - LIBERO_DATASET_ROOT=/mnt/default_storage/qiming/datasets/libero_3task_speed_varied_equal_distance_ds004 XLA_PYTHON_CLIENT_MEM_FRACTION=0.9 uv run scripts/train.py pi05_libero_5task_speed_varied --exp-name=edpos_libero_3task_speed_varied_ds004_0513 --checkpoint-base-dir=/mnt/default_storage/qiming/openpi/checkpoints --batch-size=16 --overwrite --num-train-steps=5000 --save-interval=2499 --keep-period=2499 --log-interval=50 --no-wandb-enabled
