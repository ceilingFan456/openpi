description: debug-openpi-h200-interactive

target:
  service: sing
  name: msrresrchbasicvc
  workspace_name: shared_ws

environment:
  image: amlt-sing/2.5.0-cuda12.4-cudnn9-devel

code:
  local_dir: ../

storage:
  output:
    storage_account_name: singaporeteamstorage
    container_name: shared
    mount_dir: /mnt/default_storage

env_defaults:
  USER: root
  AMLT_VULN_SCAN_MODE: "none"

jobs:
  - name: shell
    sku: 141G1-H200
    priority: high
    sla_tier: basic
    identity: managed
    command:
      - set -e
      - echo "=== Setting up openpi training environment ==="
      - cd /scratch/amlt_code
      - pwd && ls -alh
      - nvidia-smi
      ## Install system deps (sudo for non-root user)
      - sudo apt-get update && sudo apt-get install -y git git-lfs build-essential clang curl ca-certificates
      - git lfs install
      ## Install uv
      - curl -LsSf https://astral.sh/uv/install.sh | sh
      - export PATH="$$HOME/.local/bin:$$HOME/.cargo/bin:$$PATH"
      ## Install Python deps
      - git submodule update --init --recursive || true
      - GIT_LFS_SKIP_SMUDGE=1 uv sync
      - GIT_LFS_SKIP_SMUDGE=1 uv pip install -e .
      ## Apply transformers patches
      - TRANSFORMERS_DIR=$$(uv run python -c "import transformers, os; print(os.path.dirname(transformers.__file__))")
      - cp -r src/openpi/models_pytorch/transformers_replace/* "$$TRANSFORMERS_DIR/"
      ## Verify installation
      - uv run python -c "import jax; print('JAX devices:', jax.devices()); import torch; print('CUDA available:', torch.cuda.is_available())"
      - echo "=== Setup complete! Ready for training ==="
      - echo "Job is up, sleeping for SSH..."
      - echo "To run training with checkpoints saved to shared storage:"
      - echo "  XLA_PYTHON_CLIENT_MEM_FRACTION=0.9 uv run scripts/train.py <config> --exp-name=<name> --checkpoint-base-dir=/mnt/default_storage/qiming/openpi/checkpoints --overwrite"
      - sleep infinity
    submit_args:
      max_run_duration_seconds: 36000
      env:
        {
          AMLT_BLOB_ROOT_DIR: /mnt/default_storage,
          XLA_PYTHON_CLIENT_MEM_FRACTION: "0.9",
          _AZUREML_SINGULARITY_JOB_UAI: "/subscriptions/e033d461-1923-44a7-872b-78f1d35a86dd/resourcegroups/SingaporeTeam/providers/Microsoft.ManagedIdentity/userAssignedIdentities/shared_mi",
        }